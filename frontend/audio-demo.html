<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carun Procedural Audio Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #121721;
        --panel: #1b2230;
        --panel-edge: #2f3a50;
        --text: #f4f0d5;
        --accent: #f25f5c;
        --accent-2: #59c3c3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font:
          16px/1.4 "Trebuchet MS",
          Verdana,
          sans-serif;
        background:
          radial-gradient(circle at top, rgba(89, 195, 195, 0.16), transparent 36%),
          linear-gradient(180deg, #182132 0%, var(--bg) 58%);
        color: var(--text);
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2.4rem;
        letter-spacing: 0.05em;
      }

      p {
        margin: 0 0 24px;
        color: rgba(244, 240, 213, 0.8);
      }

      .panel {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.08));
        border: 1px solid var(--panel-edge);
        border-radius: 18px;
        padding: 20px;
        margin-bottom: 16px;
        backdrop-filter: blur(8px);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px 18px;
      }

      label {
        display: grid;
        gap: 8px;
      }

      button,
      select,
      input[type="range"] {
        width: 100%;
      }

      button,
      select {
        border: 1px solid var(--panel-edge);
        border-radius: 12px;
        background: #202938;
        color: var(--text);
        padding: 12px 14px;
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent-2);
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 10px;
      }

      output {
        color: var(--accent-2);
        font-variant-numeric: tabular-nums;
      }

      .status {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Carun Audio Demo</h1>
      <p>
        Use this page to tune the procedural engine, skid, surface, countdown, and impact sounds.
      </p>

      <section class="panel buttons">
        <button id="start-audio" type="button">Start Audio</button>
        <button id="stop-audio" type="button">Stop Vehicle Audio</button>
        <button id="countdown-1" type="button">Countdown 1</button>
        <button id="countdown-2" type="button">Countdown 2</button>
        <button id="countdown-3" type="button">Countdown 3</button>
        <button id="play-go" type="button">Play GO</button>
        <button id="tree-bump" type="button">Tree Bump</button>
        <button id="wall-bump" type="button">Wall Bump</button>
      </section>

      <section class="panel controls">
        <label>
          <span>Speed <output id="speed-value">0.00</output></span>
          <input id="speed" type="range" min="0" max="1" step="0.01" value="0" />
        </label>
        <label>
          <span>Throttle <output id="throttle-value">0.00</output></span>
          <input id="throttle" type="range" min="0" max="1" step="0.01" value="0" />
        </label>
        <label>
          <span>Acceleration <output id="accel-value">0.00</output></span>
          <input id="acceleration" type="range" min="-1" max="1" step="0.01" value="0" />
        </label>
        <label>
          <span>Skid <output id="skid-value">0.00</output></span>
          <input id="skid" type="range" min="0" max="1" step="0.01" value="0" />
        </label>
        <label>
          <span>Surface</span>
          <select id="surface">
            <option value="asphalt">Asphalt</option>
            <option value="grass">Grass</option>
            <option value="water">Water</option>
            <option value="curb">Curb</option>
          </select>
        </label>
        <label>
          <span>Vehicle Active</span>
          <select id="moving">
            <option value="true">Moving</option>
            <option value="false">Stopped</option>
          </select>
        </label>
      </section>

      <section class="panel">
        <div class="status" id="status">Audio idle.</div>
      </section>
    </main>
    <script src="js/audio-demo.js" type="module"></script>
  </body>
</html>
